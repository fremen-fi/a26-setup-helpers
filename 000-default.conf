<IfModule mod_ssl.c>
<VirtualHost *:443>

        ServerAdmin webmaster@localhost

        ServerName media.radio10.fi
        ServerAlias www.media.radio10.fi

        ErrorLog ${APACHE_LOG_DIR}/error.log
        CustomLog ${APACHE_LOG_DIR}/access.log combined

        RewriteEngine On
        RewriteCond %{REQUEST_URI} ^/$
        RewriteRule ^ https://player.radio10.fi [R=301,L]

        <Directory /var/www/hls>
        Options Indexes
        AllowOverride None

        Header set Access-Control-Allow-Origin "*"

#        SetEnvIfNoCase X-CDN-Token "${HLS_TOKEN}" CDN_AUTH
#        Require env CDN_AUTH
    </Directory>

    <Directory /radio-util/news_ondemand>
        Require all granted
        Options -Indexes +FollowSymLinks

        Header set Cache-Control "max-age=313536000, immutable"
        Header set Access-Control-Allow-Origin "*"

#        SetEnvIfNoCase X-CDN-Token "${HLS_TOKEN}" CDN_AUTH
#        Require env CDN_AUTH
    </Directory>

    <Directory /radio/podcast/images>
        Require all granted
        Options -Indexes +FollowSymLinks

        Header set Cache-Control "max-age=31536000"
        Header set Access-Control-Allow-Origin "*"

#        SetEnvIfNoCase X-CDN-Token "${HLS_TOKEN}" CDN_AUTH
#        Require env CDN_AUTH
    </Directory>

    <Directory /radio-util/feeds>
        Require all granted
        Options -Indexes +FollowSymLinks

        Header set Cache-Control "max-age=60"
        Header set Access-Control-Allow-Origin "*"

#        SetEnvIfNoCase X-CDN-Token "${HLS_TOKEN}" CDN_AUTH
#        Require env CDN_AUTH
    </Directory>

        Alias /hls /var/www/hls

    Alias /news_ondemand /radio-util/news_ondemand

    Alias /images /radio/podcast/images

    Alias /feeds /radio-util/feeds

    <FilesMatch "\.m3u8$">
        Header set Cache-Control "max-age=6, public"
    </FilesMatch>

    <FilesMatch "\.ts">
        Header set Cache-Control "max-age=86400, public"
    </FilesMatch>


Include /etc/letsencrypt/options-ssl-apache.conf
SSLCertificateFile /etc/letsencrypt/live/media.radio10.fi/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/media.radio10.fi/privkey.pem
</VirtualHost>
</IfModule>

services:
  radio-10:
    image: radio-10:latest
    container_name: radio-10
    restart: unless-stopped

    volumes:
      # HLS segments served by host Apache
      - /var/www/hls:/var/www/hls:rw
      # Liquidsoap socket (for telnet/monitoring access from host)
      - /run/liquidsoap:/run/liquidsoap:rw
      # TMP for Edge
      - /tmp/aircore-edge:/tmp/aircore-edge:rw
      - /tmp:/tmp:rw
      # cache for Edge
      - /var/cache/aircore-edge:/var/cache/aircore-edge:rw
      # log
      - /var/log/radio-10:/var/log/radio-10:rw

    # Optional: override script path without rebuilding
    # environment:
    #   LIQ_SCRIPT: /home/liq-user/Radio-10/script/prod.liq

    # Liquidsoap telnet port — bind to localhost only
    ports:
      - "127.0.0.1:1234:1234"

    # Prometheus exporter port (if liquidsoap exposes one)
    # - "127.0.0.1:9090:9090"

    logging:
      driver: journald
      options:
        tag: radio-10
